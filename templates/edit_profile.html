<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Update Profile</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
body { font-family: 'Inter', sans-serif; }
.spinner { border: 2px solid rgba(255,255,255,0.3); border-top: 2px solid white; border-radius: 50%; width: 18px; height: 18px; animation: spin 1s linear infinite; display: inline-block; vertical-align: middle; }
@keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
</style>
</head>
<body class="min-h-screen bg-gradient-to-br from-[#0f172a] via-[#1e293b] to-[#334155] flex items-center justify-center p-4">

<!-- Form Card -->
<div class="w-full max-w-5xl bg-white rounded-2xl shadow-2xl p-6 sm:p-10">
<h1 class="text-xl sm:text-2xl font-semibold text-gray-800 text-center mb-6">Update Profile</h1>

<form method="POST" class="space-y-5" id="updateForm">

  <!-- Horizontal Grid for multiple fields -->
  <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
    <div>
      <label for="name" class="text-sm font-medium text-gray-700">Name</label>
      <input type="text" id="name" name="name" value="{{ user.name }}" class="mt-1 w-full p-2 text-sm border border-gray-300 rounded-xl bg-gray-100 focus:ring-2 focus:ring-blue-500 focus:outline-none transition" />
    </div>
    <div>
      <label for="email" class="text-sm font-medium text-gray-700">Email</label>
      <input type="email" id="email" name="email" value="{{ user.email }}" required class="mt-1 w-full p-2 text-sm border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500 focus:outline-none transition" />
    </div>
    <div>
      <label for="phone" class="text-sm font-medium text-gray-700">Phone</label>
      <input type="text" id="phone" name="phone" value="{{ user.phone }}" class="mt-1 w-full p-2 text-sm border border-gray-300 rounded-xl bg-gray-100 focus:ring-2 focus:ring-blue-500 focus:outline-none transition" />
    </div>
    <div>
      <label for="country" class="text-sm font-medium text-gray-700">Country</label>
      <input type="text" id="country" name="country" value="{{ user.country }}" class="mt-1 w-full p-2 text-sm border border-gray-300 rounded-xl bg-gray-100 focus:ring-2 focus:ring-blue-500 focus:outline-none transition" />
    </div>
  </div>

  <!-- Horizontal Grid Row 2 -->
  <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
    <div>
      <label for="state" class="text-sm font-medium text-gray-700">State</label>
      <input type="text" id="state" name="state" value="{{ user.state }}" class="mt-1 w-full p-2 text-sm border border-gray-300 rounded-xl bg-gray-100 focus:ring-2 focus:ring-blue-500 focus:outline-none transition" />
    </div>
    <div>
      <label for="church_branch" class="text-sm font-medium text-gray-700">Local Church</label>
      <input type="text" id="church_branch" name="church_branch" value="{{ user.church_branch }}" class="mt-1 w-full p-2 text-sm border border-gray-300 rounded-xl bg-gray-100 focus:ring-2 focus:ring-blue-500 focus:outline-none transition" />
    </div>
    <div>
      <label for="partner_since" class="text-sm font-medium text-gray-700">Partner Since</label>
      <select id="partner_since" name="partner_since" class="mt-1 w-full p-2 text-sm border border-gray-300 rounded-xl bg-gray-100 focus:ring-2 focus:ring-blue-500 focus:outline-none transition">
        {% for year in range(1990, 2025) %}
          <option value="{{ year }}" {% if user.partner_since == year %} selected {% endif %}>{{ year }}</option>
        {% endfor %}
      </select>
    </div>
    <div>
      <label for="address" class="text-sm font-medium text-gray-700">Address</label>
      <input type="text" id="address" name="address" value="{{ user.address }}" class="mt-1 w-full p-2 text-sm border border-gray-300 rounded-xl bg-gray-100 focus:ring-2 focus:ring-blue-500 focus:outline-none transition" />
    </div>
  </div>

  <!-- Buttons -->
  <div class="flex flex-col md:flex-row justify-center gap-4 mt-4">
    <!-- Update Button -->
    <button type="submit" id="updateBtn" class="flex-1 p-3 bg-blue-600 text-white text-sm sm:text-base rounded-xl shadow-md hover:bg-blue-700 transition duration-200 flex justify-center items-center gap-2">
      <span class="btn-text">Update Profile</span>
      <span class="spinner hidden"></span>
    </button>
    <!-- Cancel Button -->
    <a href="/home2" id="cancelBtn" class="flex-1 p-3 bg-gray-600 text-white text-sm sm:text-base rounded-xl shadow-md hover:bg-gray-700 transition duration-200 flex justify-center items-center gap-2 text-center">
      <span class="btn-text">Cancel</span>
      <span class="spinner hidden"></span>
    </a>
  </div>

</form>
</div>

<script>
// Buttons
const form = document.getElementById('updateForm');
const updateBtn = document.getElementById('updateBtn');
const cancelBtn = document.getElementById('cancelBtn');

function showSpinner(btnElement) {
  const text = btnElement.querySelector('.btn-text');
  const spinner = btnElement.querySelector('.spinner');
  text.classList.add('opacity-0');
  spinner.classList.remove('hidden');
  btnElement.classList.add('cursor-not-allowed');
  btnElement.disabled = true;
}

// Update button spinner on submit
form.addEventListener('submit', function(e){
  showSpinner(updateBtn);
});

// Cancel button spinner on click
cancelBtn.addEventListener('click', function(e){
  showSpinner(cancelBtn);
});
</script>

</body>
</html>

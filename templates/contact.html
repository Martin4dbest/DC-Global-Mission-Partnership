<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Help Center</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
body { font-family: 'Poppins', sans-serif; }
.card { 
    transition: all 0.3s ease; 
}
.card:hover { 
    transform: scale(1.05); 
    background-color: #00509e; 
}
.icon { font-size: 1.8rem; }
.text-link { font-size: 0.95rem; font-weight: 500; }
</style>
</head>
<body class="bg-[#001f3f] text-white flex flex-col items-center justify-center min-h-screen p-4 text-center">

    <h1 class="text-2xl md:text-3xl font-semibold mb-6">How can we help you today?</h1>

    <div class="flex flex-col gap-4 max-w-sm w-full">

        <div class="flex items-center justify-start p-4 bg-[#003366] rounded-xl card cursor-pointer">
            <i class="text-[#00c6ff] mr-4 icon">&#128222;</i>
            <a href="tel:+2347061997004" class="text-link">Call Us</a>
        </div>

        <div class="flex items-center justify-start p-4 bg-[#003366] rounded-xl card cursor-pointer">
            <i class="text-[#00c6ff] mr-4 icon">&#128196;</i>
            <a href="https://www.dominioncity.cc/about" target="_blank" class="text-link">Find Your Answer</a>
        </div>

        <div class="flex items-center justify-start p-4 bg-[#003366] rounded-xl card cursor-pointer">
            <i class="text-[#00c6ff] mr-4 icon">&#128172;</i>
            <a href="{{ url_for('feedback') }}" class="text-link">Send Feedback</a>
        </div>

    </div>

    <a href="{{ url_for('index') }}" 
       class="inline-block mt-6 py-2 px-6 bg-[#0e4c92] text-yellow-400 font-semibold rounded-full hover:bg-[#0c3f74] transition-colors text-sm md:text-base">
        Back to Home
    </a>

</body>
</html>

<!DOCTYPE html> 
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Contact Details</title>

<link href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
    body {
        font-family: 'Poppins', sans-serif;
        background: #f5f7fb;
        font-size: 0.85rem;
        margin: 0;
        padding: 0;
        color: #333;
    }

    .container {
        max-width: 1200px;
        margin: 30px auto;
        background: #ffffff;
        padding: 20px;
        border-radius: 12px;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
    }

    h2 {
        text-align: center;
        font-weight: 600;
        font-size: 1.1rem;
        margin-bottom: 20px;
        color: #222;
    }

    /* Search */
    .search-box {
        text-align: center;
        margin-bottom: 15px;
    }

    .search-box input {
        width: 260px;
        max-width: 100%;
        padding: 6px 12px;
        border-radius: 20px;
        border: 1px solid #ddd;
        font-size: 0.8rem;
        outline: none;
        transition: 0.3s ease;
    }

    .search-box input:focus {
        border-color: #4a90e2;
        box-shadow: 0 0 0 2px rgba(74,144,226,0.1);
    }

    table {
        font-size: 0.8rem;
    }

    thead {
        background: #f0f4ff;
    }

    th {
        font-weight: 500;
        color: #333;
        border-top: none !important;
    }

    tr {
        transition: 0.2s ease;
    }

    tr:hover {
        background-color: #f9fbff;
    }

    .back-link {
        display: inline-block;
        margin-top: 15px;
        font-size: 0.8rem;
        text-decoration: none;
        background: #4a90e2;
        color: #fff;
        padding: 6px 16px;
        border-radius: 20px;
        transition: 0.3s ease;
    }

    .back-link:hover {
        background: #357abd;
        text-decoration: none;
        color: #fff;
    }

    @media (max-width: 768px) {
        .container {
            margin: 15px;
            padding: 15px;
        }

        h2 {
            font-size: 1rem;
        }

        table {
            font-size: 0.75rem;
        }

        .search-box input {
            width: 100%;
        }
    }
</style>
</head>

<body>

<div class="container">
    <h2>Admins Contact Details</h2>

    <!-- LIVE SEARCH (No Form, No Button) -->
    <div class="search-box">
        <input type="text" id="searchInput" placeholder="Search by any field...">
    </div>

    <div class="table-responsive">
        <table class="table table-hover" id="adminTable">
            <thead>
                <tr>
                    <th>Admin Name</th>
                    <th>Email</th>
                    <th>Phone</th>
                    <th>Country</th>
                    <th>State</th>
                    <th>Local Church</th>
                    <th>Address</th>
                </tr>
            </thead>
            <tbody>
                {% for admin in admins %}
                <tr>
                    <td>{{ admin.name }}</td>
                    <td>{{ admin.email }}</td>
                    <td>{{ admin.phone }}</td>
                    <td>{{ admin.country }}</td>
                    <td>{{ admin.state }}</td>
                    <td>{{ admin.church_branch }}</td>
                    <td>{{ admin.address }}</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>

    <a href="{{ url_for('admin_dashboard') }}" class="back-link">
        ← Back
    </a>
</div>

<script>
document.getElementById("searchInput").addEventListener("keyup", function() {
    let filter = this.value.toLowerCase();
    let rows = document.querySelectorAll("#adminTable tbody tr");

    rows.forEach(function(row) {
        let text = row.textContent.toLowerCase();
        row.style.display = text.includes(filter) ? "" : "none";
    });
});
</script>

</body>
</html>

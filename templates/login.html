<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>

<!-- Font Awesome -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
<!-- Bootstrap CSS -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
/* ================= Body ================= */
body {
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg, #0A3D62, #3C6382, #F5F6FA);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    margin: 0;
}

/* ================= Login Container ================= */
.login-container {
    background-color: rgba(255,255,255,0.97);
    padding: 2rem;
    border-radius: 15px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.15);
    width: 100%;
    max-width: 400px;
    text-align: center;
}

/* ================= Heading ================= */
.login-container h1 {
    font-weight: 600;
    color: #0052D4;
    font-size: 1.8rem;
    margin-bottom: 1.5rem;
}

/* ================= Input Fields ================= */
.input-field {
    padding-left: 2.5rem;
}

.input-icon {
    left: 0.75rem;
}

.input-password {
    padding-left: 2.5rem;
    padding-right: 3rem;
}

.input-eye {
    right: 1rem;
    cursor: pointer;
}

.form-control {
    font-size: 0.9rem;
    height: 45px;
}

/* ================= Buttons ================= */
.btn-primary {
    background-color: #0052D4;
    border: none;
    font-weight: 500;
    transition: all 0.3s ease;
    position: relative;
}

.btn-primary:active {
    transform: scale(0.98);
}

.btn-primary.loading::after {
    content: '';
    position: absolute;
    right: 15px;
    top: 50%;
    transform: translateY(-50%);
    border: 2px solid #fff;
    border-top: 2px solid transparent;
    border-radius: 50%;
    width: 18px;
    height: 18px;
    animation: spin 1s linear infinite;
}

@keyframes spin {
    0% { transform: translateY(-50%) rotate(0deg); }
    100% { transform: translateY(-50%) rotate(360deg); }
}

/* ================= Flash Messages ================= */
.alert {
    font-size: 0.85rem;
}

/* ================= Links ================= */
.login-container a {
    font-size: 0.85rem;
    color: #0052D4;
    text-decoration: none;
}

.login-container a:hover {
    text-decoration: underline;
}

/* ================= Responsive ================= */
@media (max-width: 576px) {
    .login-container {
        padding: 1.5rem;
        max-width: 95%;
    }
    .login-container h1 {
        font-size: 1.5rem;
    }
    .form-control {
        font-size: 0.85rem;
        height: 42px;
    }
    .btn-primary {
        font-size: 0.9rem;
    }
}
</style>
</head>
<body>

<div class="login-container">
    <h1>Login</h1>

    <!-- Flash message for wrong login -->
    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            <div class="alert alert-danger">
                {% for category, message in messages %}
                    {{ message }}
                {% endfor %}
            </div>
        {% endif %}
    {% endwith %}

    <form method="POST" action="{{ url_for('login') }}" id="loginForm">

        <!-- Email or Phone -->
        <div class="mb-3 position-relative">
            <i class="fas fa-user position-absolute input-icon top-50 translate-middle-y text-muted"></i>
            <input type="text" name="email" id="login_input" placeholder="Email or Phone" required
                   class="form-control input-field rounded-pill">
        </div>

        <!-- Password -->
        <div class="mb-3 position-relative">
            <i class="fas fa-key position-absolute input-icon top-50 translate-middle-y text-muted"></i>
            <input type="password" id="password" name="password" placeholder="Password" required
                   class="form-control input-password rounded-pill">
            <i class="fas fa-eye position-absolute input-eye top-50 translate-middle-y text-muted" id="togglePassword"></i>
        </div>

        <!-- Login Button -->
        <button type="submit" class="btn btn-primary w-100 rounded-pill py-2" id="loginButton">Login</button>
    </form>

    <p class="mt-3">
        <a href="{{ url_for('change_password') }}">Forgot Password? Change your password</a>
    </p>
</div>

<script>
// Toggle password visibility
document.getElementById('togglePassword').addEventListener('click', function () {
    const passwordField = document.getElementById('password');
    if (passwordField.type === 'password') {
        passwordField.type = 'text';
        this.classList.replace('fa-eye', 'fa-eye-slash');
    } else {
        passwordField.type = 'password';
        this.classList.replace('fa-eye-slash', 'fa-eye');
    }
});

// Add loading effect to login button
document.getElementById('loginForm').addEventListener('submit', function() {
    const btn = document.getElementById('loginButton');
    btn.classList.add('loading');
    btn.disabled = true;
});
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

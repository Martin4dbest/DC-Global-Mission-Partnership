<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dominion City Partnership Platform</title>

<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>
body{
    font-family:'Inter',sans-serif; 
    background:#F8FAFC;
}
:root{
--primary:#0F172A; /* deep navy */
--accent:#3B82F6;  /* blue */
--border:#E2E8F0;
--muted:#475569;
--success:#059669;
}
.card{
    background:#fff;
    border:1px solid var(--border);
    border-radius:14px;
    box-shadow:0 8px 24px rgba(15,23,42,.05);
    transition:.25s ease;
}
.card:hover{
    box-shadow:0 12px 32px rgba(15,23,42,.08);
}
.input{
    width:100%;
    padding:10px;
    border-radius:10px;
    border:1px solid var(--border);
    transition:.2s ease;
    font-size:0.85rem;
}
.input:focus{
    outline:none;
    border-color:var(--accent);
    box-shadow:0 0 0 3px rgba(59,130,246,.15);
}
.btn{
    background:var(--primary);
    color:white;
    padding:10px;
    border-radius:10px;
    font-weight:600;
    transition:.2s ease;
    font-size:0.85rem;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:6px;
}
.btn:hover{ background:#020617; }
.method{
    border:1px solid var(--border);
    border-radius:12px;
    padding:12px;
    text-align:center;
    transition:.2s ease;
    font-size:0.85rem;
}
.method:hover{
    border-color:var(--accent);
    transform:translateY(-2px);
}
.text-gradient{
    background-clip: text;
    -webkit-background-clip: text;
    color: transparent;
}

/* Spinner CSS */
.spinner {
    border:2px solid rgba(255,255,255,0.3);
    border-top:2px solid #fff;
    border-radius:50%;
    width:14px;
    height:14px;
    display:inline-block;
    vertical-align:middle;
    animation:spin 0.8s linear infinite;
}
@keyframes spin {
    0% { transform:rotate(0deg); }
    100% { transform:rotate(360deg); }
}
</style>
</head>

<body class="min-h-screen p-4">

<div class="max-w-4xl mx-auto">

<!-- HEADER -->
<div class="flex justify-between items-center mb-4">
  <div>
    <h1 class="text-lg md:text-xl font-bold text-gradient bg-gradient-to-r from-blue-700 via-blue-500 to-blue-400">
      Dominion City <span class="text-blue-900">Partnership</span>
    </h1>
    <p class="text-xs md:text-sm font-medium mt-1 text-gradient bg-gradient-to-r from-blue-400 via-blue-500 to-blue-600">
      Secure donation & payment tracking
    </p>
  </div>

  <a href="{{ url_for('home2') }}" 
     class="text-muted text-xs md:text-sm font-medium hover:text-slate-900 transition">
     Back
  </a>
</div>

<!-- MAIN HORIZONTAL LAYOUT -->
<div class="grid lg:grid-cols-2 gap-4">

<!-- LEFT SIDE -->
<div class="space-y-3">

<!-- Bank Accounts -->
<div class="card p-3 md:p-4">
  <h2 class="text-xs md:text-sm font-medium text-slate-700 mb-2">Bank Accounts</h2>
  <div class="grid md:grid-cols-2 gap-2">
    <div class="p-2 border rounded-lg">
      <p class="text-xs text-muted">USD Account</p>
      <p class="text-sm font-medium mt-1 text-slate-700">Wells Fargo</p>
      <p class="text-base font-bold mt-1 text-slate-900">3240 7000 74</p>
      <p class="text-xs text-muted mt-1">Routing: 121000248</p>
    </div>
    <div class="p-2 border rounded-lg">
      <p class="text-xs text-muted">NGN Account</p>
      <p class="text-sm font-medium mt-1 text-slate-700">Fidelity Bank</p>
      <p class="text-base font-bold mt-1 text-slate-900">4110 0413 41</p>
    </div>
  </div>
</div>

<!-- Payment Methods -->
<div class="card p-3 md:p-4">
  <h2 class="text-xs md:text-sm font-medium text-slate-700 mb-2">Online Payment</h2>
  <div class="grid grid-cols-3 gap-2 text-xs">
    <a href="https://www.paypal.com/paypalme/dominioncityglobal" target="_blank" class="method">
      <div class="text-xl mb-1">💳</div> PayPal
    </a>
    <a href="{{ url_for('paystack') }}" class="method">
      <div class="text-xl mb-1">💰</div> Paystack
    </a>
    <a href="mailto:give@dominioncityglobal.org" class="method">
      <div class="text-xl mb-1">🏦</div> Zelle
    </a>
  </div>
</div>

</div>

<!-- RIGHT SIDE -->
<div class="card p-4 md:p-5">

  <h2 class="text-xs md:text-sm font-medium text-slate-700 mb-3">
    Track payment after payment
  </h2>

  <form action="{{ url_for('donate') }}" method="POST" enctype="multipart/form-data" onsubmit="return handleSubmit();">

    <label class="flex items-center gap-2 mb-3 cursor-pointer text-xs text-slate-700">
      <input type="checkbox" id="offline_donation" onchange="toggleFields()" class="w-4 h-4">
      I have already made payment
    </label>

    <div id="amount-entry" class="hidden space-y-2">

      <div>
        <label class="block mb-1 text-xs font-medium text-slate-700">Amount Paid</label>
        <input type="number" id="amountRaw" name="amount" step="0.01"
        class="input text-xs" oninput="formatAmount(this)" required>
        <input type="text" id="formattedAmount" readonly class="input mt-1 text-xs bg-slate-100">
      </div>

      <div>
        <label class="block mb-1 text-xs font-medium text-slate-700">Payment Type</label>
        <select name="payment_type" required class="input text-xs">
          <option value="" disabled selected>Select type</option>
          <option value="part_payment">Part Payment</option>
          <option value="full_payment">Full/Balance Payment</option>
        </select>
      </div>

      <div>
        <label class="block mb-1 text-xs font-medium text-slate-700">Currency</label>
        <select name="currency" required class="input text-xs">
          <option value="USD">USD</option>
          <option value="NGN">NGN</option>
          <option value="EUR">EUR</option>
          <option value="GBP">GBP</option>
          <option value="CAD">CAD</option>
          <option value="AUD">AUD</option>
          <option value="ZAR">ZAR</option>
        </select>
      </div>

      <div>
        <label class="block mb-1 text-xs font-medium text-slate-700">Payment Date</label>
        <input type="date" name="date_donated" value="{{ donation_date | default(today) }}" required class="input text-xs">
      </div>

      <div>
        <label class="block mb-1 text-xs font-medium text-slate-700">Upload Receipt</label>
        <input type="file" id="receipt-file" name="receipt" accept="image/*,.pdf" onchange="previewReceipt(this)" class="text-xs">
        <div id="receipt-preview" class="mt-1"></div>
      </div>

      <!-- Confirm Payment Button -->
      <button type="submit" id="submitBtn" class="btn w-full mt-2 text-xs">
        <span id="btnText">Confirm Payment</span>
        <span id="btnSpinner" class="spinner hidden"></span>
      </button>

    </div>

  </form>

</div>

</div>

<script>
// Show/hide offline donation fields
function toggleFields(){
  document.getElementById("amount-entry").style.display = document.getElementById("offline_donation").checked ? "block" : "none";
}

// Format amount with commas
function formatAmount(input){
  const raw = input.value.replace(/,/g,'');
  document.getElementById("formattedAmount").value = raw ? Number(raw).toLocaleString() : '';
}

// Preview uploaded receipt
function previewReceipt(input){
  const preview = document.getElementById("receipt-preview");
  preview.innerHTML = '';
  if(input.files && input.files[0]){
    const file = input.files[0];
    if(file.type.startsWith('image/')){
      const img = document.createElement('img');
      img.src = URL.createObjectURL(file);
      img.className = "rounded-lg shadow max-w-full";
      preview.appendChild(img);
    } else if(file.type === 'application/pdf'){
      const link = document.createElement('a');
      link.href = URL.createObjectURL(file);
      link.target = "_blank";
      link.className = "text-blue-600 font-semibold text-xs";
      link.innerText = "View Uploaded PDF";
      preview.appendChild(link);
    }
  }
}

// Validate form and show loading spinner
function handleSubmit(){
  const amount = document.getElementById("amountRaw").value;
  if(isNaN(amount) || amount <= 0){
    alert("Please enter a valid amount.");
    return false;
  }

  const btn = document.getElementById("submitBtn");
  const btnText = document.getElementById("btnText");
  const btnSpinner = document.getElementById("btnSpinner");
  btn.disabled = true;
  btnText.textContent = "Processing...";
  btnSpinner.classList.remove("hidden");
  return true;
}
</script>

</body>
</html>

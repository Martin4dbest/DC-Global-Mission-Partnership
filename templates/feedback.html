<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>DC Global Mission Partnership Feedback</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body{
font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}
</style>

</head>

<body class="min-h-screen flex items-center justify-center bg-gradient-to-br from-[#0f2027] via-[#203a43] to-[#2c5364] p-4">

<div class="w-full max-w-md">

<!-- Form Card -->

<div class="bg-white rounded-2xl shadow-2xl p-8">

<h1 class="text-2xl font-bold text-gray-800 text-center mb-6">
DC Global Mission Partnership
</h1>

<p class="text-center text-gray-500 mb-6">
Feedback Form
</p>

<form action="https://formspree.io/f/xojkaoeq" method="POST" class="space-y-5">

<!-- Email Subject -->

<input type="hidden" name="_subject" value="DC Global Mission Partnership Feedback Form">

<!-- Spam Protection -->

<input type="text" name="_gotcha" style="display:none">

<!-- Name -->

<div>

<label class="text-sm font-semibold text-gray-700">
Name
</label>

<input
type="text"
name="name"
required
placeholder="Enter your name"
class="w-full mt-2 px-4 py-3 border rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition"
/>

</div>

<!-- Email -->

<div>

<label class="text-sm font-semibold text-gray-700">
Email
</label>

<input
type="email"
name="email"
required
placeholder="Enter your email"
class="w-full mt-2 px-4 py-3 border rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition"
/>

</div>

<!-- Message -->

<div>

<label class="text-sm font-semibold text-gray-700">
Message
</label>

<textarea
name="message"
rows="4"
required
placeholder="Write your feedback..."
class="w-full mt-2 px-4 py-3 border rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition"
></textarea>

</div>

<!-- Submit Button -->

<button
type="submit"
class="w-full bg-blue-600 text-white py-3 rounded-xl font-semibold hover:bg-blue-700 transition duration-300 shadow-md">
Submit Feedback
</button>

</form>

</div>

<!-- Back Button -->

<div class="text-center mt-5">

<a href="{{ url_for('contact') }}"
class="inline-block px-6 py-3 bg-green-600 text-white rounded-xl font-semibold hover:bg-green-700 transition shadow">

Back

</a>

</div>

</div>

</body>
</html>

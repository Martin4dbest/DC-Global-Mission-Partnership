<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Registration</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
<style>
    /* Reset & Fonts */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background: linear-gradient(135deg, #f5f7fa, #c3cfe2);
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        color: #333;
        padding: 20px;
        font-size: 14px; /* reduced base font size */
    }

    /* Card Container */
    .container {
        background: #fff;
        display: flex;
        flex-direction: row;
        border-radius: 20px;
        box-shadow: 0 15px 40px rgba(0,0,0,0.2);
        overflow: hidden;
        max-width: 900px;
        width: 100%;
    }

    .left-panel {
        flex: 1;
        background: url('https://images.unsplash.com/photo-1590608897129-79a42f6b9b98?auto=format&fit=crop&w=800&q=80') center/cover no-repeat;
        display: none; 
    }

    .right-panel {
        flex: 1.2;
        padding: 30px 20px;
    }

    h1 {
        text-align: center;
        margin-bottom: 20px;
        font-size: 1.6em; /* reduced heading */
        color: #0052D4;
    }

    form {
        display: flex;
        flex-wrap: wrap;
        gap: 15px;
    }

    .form-group {
        flex: 1 1 45%;
        display: flex;
        flex-direction: column;
    }

    label {
        font-weight: 600;
        margin-bottom: 5px;
        font-size: 0.9em; /* reduced label size */
    }

    input, select {
        padding: 10px;
        border-radius: 8px;
        border: 1px solid #ccc;
        background: #f7f7f7;
        transition: 0.3s;
        font-size: 0.9em; /* reduced input font */
    }

    input:focus, select:focus {
        border-color: #0052D4;
        outline: none;
    }

    .full-width { flex: 1 1 100%; }

    button {
        width: 100%;
        padding: 12px;
        background: #0052D4;
        color: #fff;
        border: none;
        border-radius: 8px;
        font-size: 0.95em; /* smaller button font */
        cursor: pointer;
        transition: 0.3s;
    }

    button:hover {
        background: #003f9e;
        transform: translateY(-1px);
    }

    p {
        text-align: center;
        margin-top: 10px;
        font-size: 0.85em; /* reduced paragraph font */
    }

    a {
        color: #0052D4;
        text-decoration: none;
    }

    a:hover {
        text-decoration: underline;
    }

    .flashes { list-style: none; text-align: center; color: #ff9900; margin-top: 10px; }

    .password-wrapper { position: relative; }
    .password-wrapper i {
        position: absolute;
        right: 10px;
        top: 50%;
        transform: translateY(-50%);
        cursor: pointer;
        color: #888;
    }

    @media(max-width: 900px) {
        .container { flex-direction: column; border-radius: 20px; }
        .left-panel { display: none; }
    }

    @media(max-width: 600px) {
        .form-group { flex: 1 1 100%; }
        h1 { font-size: 1.4em; }
        .right-panel { padding: 20px 15px; }
    }
</style>
</head>
<body>

<div class="container">
    <div class="left-panel"></div>
    <div class="right-panel">
        <h1>Register Admin</h1>
        <form method="POST" action="{{ url_for('admin_register') }}">
            <div class="form-group full-width">
                <label for="name">Full Name:</label>
                <input type="text" name="name" required>
            </div>
            <div class="form-group">
                <label for="email">Email:</label>
                <input type="email" name="email" required>
            </div>
            <div class="form-group">
                <label for="phone">Phone:</label>
                <input type="tel" name="phone" required>
            </div>

            <div class="form-group full-width password-wrapper">
                <label for="password">Password:</label>
                <input type="password" id="password" name="password" required>
                <i class="fas fa-eye" id="togglePassword"></i>
            </div>

            <div class="form-group">
                <label for="church_branch">Local Church:</label>
                <input type="text" id="church_branch" name="church_branch" required>
            </div>

            <div class="form-group">
                <label for="address">Address:</label>
                <input type="text" name="address">
            </div>

            <div class="form-group">
                <label for="country">Country:</label>
                <select id="country" name="country" required onchange="updateStates()">
                    <option value="">Select Country</option>
                    <option value="Nigeria">Nigeria</option>
                    <option value="United States">United States</option>
                    <option value="Canada">Canada</option>
                    <option value="United Kingdom">United Kingdom</option>
                    <option value="Australia">Australia</option>
                    <option value="India">India</option>
                    <option value="South Africa">South Africa</option>
                    <option value="Ghana">Ghana</option>
                    <option value="Kenya">Kenya</option>
                    <option value="Germany">Germany</option>
                    <option value="France">France</option>
                    <option value="Brazil">Brazil</option>
                    <option value="Argentina">Argentina</option>
                    <option value="Mexico">Mexico</option>
                    <option value="Italy">Italy</option>
                    <option value="Spain">Spain</option>
                    <option value="Netherlands">Netherlands</option>
                    <option value="Russia">Russia</option>
                    <option value="Japan">Japan</option>
                    <option value="China">China</option>
                    <option value="United Arab Emirates">United Arab Emirates</option>
                    <option value="Country Not listed">Country Not listed</option>
                </select>
            </div>

            <div class="form-group">
                <label for="manual_country">If your country is not listed:</label>
                <input type="text" id="manual_country" name="manual_country" placeholder="Enter country name">
            </div>

            <div class="form-group">
                <label for="state_select">State:</label>
                <select id="state_select" name="state">
                    <option value="">Select State</option>
                </select>
            </div>

            <div class="form-group">
                <label for="manual_state">Or type your state:</label>
                <input type="text" id="manual_state" name="manual_state" placeholder="Type your state if not listed">
            </div>

            <div class="form-group full-width">
                <button type="submit">Register</button>
            </div>

            <p class="full-width">Already have an account? <a href="{{ url_for('admin_login') }}">Login here</a>.</p>
        </form>

        {% with messages = get_flashed_messages() %}
            {% if messages %}
                <ul class="flashes">
                    {% for message in messages %}
                        <li>{{ message }}</li>
                    {% endfor %}
                </ul>
            {% endif %}
        {% endwith %}
    </div>
</div>

<script>
    document.getElementById('togglePassword').addEventListener('click', function () {
        const passwordField = document.getElementById('password');
        if (passwordField.type === 'password') {
            passwordField.type = 'text';
            this.classList.remove('fa-eye');
            this.classList.add('fa-eye-slash');
        } else {
            passwordField.type = 'password';
            this.classList.remove('fa-eye-slash');
            this.classList.add('fa-eye');
        }
    });

    const countryStateData = {
        "Nigeria": ["Abia","Adamawa","Akwa Ibom","Anambra","Bauchi","Bayelsa","Benue","Borno","Cross River","Delta","Ebonyi","Edo","Ekiti","Enugu","Gombe","Imo","Jigawa","Kaduna","Kano","Kogi","Kwara","Lagos","Nasarawa","Niger","Ogun","Ondo","Osun","Oyo","Plateau","Rivers","Sokoto","Taraba","Yobe","Zamfara","Abuja"],
        "United States":["Alabama","Alaska","Arizona","Arkansas","California","Colorado","Connecticut","Delaware","Florida","Georgia","Hawaii","Idaho","Illinois","Indiana","Iowa","Kansas","Kentucky","Louisiana","Maine","Maryland","Massachusetts","Michigan","Minnesota","Mississippi","Missouri","Montana","Nebraska","Nevada","New Hampshire","New Jersey","New Mexico","New York","North Carolina","North Dakota","Ohio","Oklahoma","Oregon","Pennsylvania","Rhode Island","South Carolina","South Dakota","Tennessee","Texas","Utah","Vermont","Virginia","Washington","West Virginia","Wisconsin","Wyoming"],
        "Canada":["Alberta","British Columbia","Manitoba","New Brunswick","Newfoundland and Labrador","Nova Scotia","Ontario","Prince Edward Island","Quebec","Saskatchewan"],
        "Country Not listed":["State N/A"]
    };

    function updateStates() {
        const countrySelect = document.getElementById('country');
        const stateSelect = document.getElementById('state_select');
        const selectedCountry = countrySelect.value;

        stateSelect.innerHTML = '<option value="">Select State</option>';

        if (selectedCountry && countryStateData[selectedCountry]) {
            countryStateData[selectedCountry].forEach(state => {
                const option = document.createElement('option');
                option.value = state;
                option.textContent = state;
                stateSelect.appendChild(option);
            });
        }
    }
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pay with Paystack</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
<style>
    body {
        font-family: 'Poppins', sans-serif;
        background: #1f2937; /* dark gray background */
    }
    .card {
        background: #111827;
        border-radius: 20px;
        padding: 2rem;
        box-shadow: 0 12px 24px rgba(0,0,0,0.3);
    }
    .input {
        width: 100%;
        padding: 10px;
        border-radius: 10px;
        border: 1px solid #374151;
        background: #f9fafb;
        color: #111827;
        font-size: 0.9rem;
    }
    .input:focus {
        outline: none;
        border-color: #facc15; /* yellow accent */
        box-shadow: 0 0 0 2px rgba(250,204,21,0.3);
    }
    .btn-pay {
        background: #facc15;
        color: #111827;
        font-weight: 600;
        padding: 12px;
        border-radius: 12px;
        transition: all 0.2s ease;
    }
    .btn-pay:hover {
        background: #eab308;
        transform: translateY(-2px);
        box-shadow: 0 6px 16px rgba(0,0,0,0.25);
    }
    h1 {
        color: #facc15;
    }
    p.note {
        color: #facc15;
        font-size: 0.8rem;
    }
</style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

<!-- Back Button -->
<div class="absolute top-4 left-4 flex items-center gap-2 z-50">
    <a href="{{ url_for('donate') }}" class="text-yellow-400 text-2xl hover:text-yellow-300">
        <i class="fas fa-arrow-left"></i>
    </a>
    <a href="{{ url_for('donate') }}" class="text-yellow-400 font-medium hover:text-yellow-300">Back</a>
</div>

<!-- Form Card -->
<div class="card w-full max-w-sm mx-auto text-white">

    <h1 class="text-2xl font-bold mb-3">Donate Securely</h1>
    <p class="text-gray-300 mb-6 text-sm">Your donation is safe and encrypted with Paystack.</p>

    <form id="paymentForm" class="space-y-3">

        <div>
            <label for="fullName" class="block font-semibold mb-1 text-sm">Full Name</label>
            <input type="text" id="fullName" placeholder="Enter your full name" required class="input">
        </div>

        <div>
            <label for="email" class="block font-semibold mb-1 text-sm">Email</label>
            <input type="email" id="email" placeholder="Enter your email" required class="input">
            <p class="note mt-1">A receipt will be sent to this email.</p>
        </div>

        <div>
            <label for="contact" class="block font-semibold mb-1 text-sm">Contact (Mobile)</label>
            <input type="tel" id="contact" placeholder="Include country code e.g., +234" required class="input">
        </div>

        <div>
            <label for="amount" class="block font-semibold mb-1 text-sm">Amount</label>
            <input type="text" id="amount" placeholder="Enter amount in NGN" required class="input" oninput="formatAmount(this)">
        </div>

        <div>
            <label for="remark" class="block font-semibold mb-1 text-sm">Remark</label>
            <input type="text" id="remark" placeholder="Add a note (optional)" class="input">
        </div>

        <button type="button" id="payWithPaystack" class="btn-pay w-full mt-2 flex justify-center items-center gap-2 text-sm">
            <i class="fas fa-credit-card"></i> PAY NOW
        </button>

    </form>
</div>

<script src="https://js.paystack.co/v1/inline.js"></script>
<script>
    function formatAmount(input) {
        let value = input.value.replace(/,/g,'');
        if(!isNaN(value) && value!=="") input.value = parseFloat(value).toLocaleString('en');
        else input.value = "";
    }

    document.getElementById("payWithPaystack").addEventListener("click", function(e){
        e.preventDefault();

        const fullName = document.getElementById("fullName").value;
        const email = document.getElementById("email").value;
        const amountField = document.getElementById("amount").value.replace(/,/g,'');

        if(!fullName || !email || !amountField || isNaN(amountField) || parseFloat(amountField)<=0){
            alert('Please fill all fields correctly and ensure amount is a positive number.');
            return;
        }

        const amountInKobo = parseFloat(amountField)*100;

        const handler = PaystackPop.setup({
            key: "pk_live_43f0e995f8e312c4dbf4d79b2edbe34802f4defc",
            email: email,
            amount: amountInKobo,
            currency: "NGN",
            callback: function(response){
                fetch('/verify-payment',{
                    method:'POST',
                    headers:{'Content-Type':'application/json'},
                    body:JSON.stringify({reference:response.reference})
                })
                .then(res=>res.json())
                .then(data=>{
                    if(data.status==='success') alert('Payment verified successfully!');
                    else alert('Payment verification failed: '+data.message);
                }).catch(error=>{
                    alert('Error verifying payment: '+error.message);
                });
            },
            onClose: function(){
                alert('Payment window closed.');
            }
        });
        handler.openIframe();
    });
</script>

</body>
</html>

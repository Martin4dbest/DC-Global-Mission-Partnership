<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pledge Form</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
    display:flex;
    justify-content:center;
    align-items:flex-start;
    min-height:100vh;
    padding:20px;
}
.container {
    width:100%;
    max-width:480px;
    background: rgba(255,255,255,0.95);
    backdrop-filter: blur(10px);
    border-radius:25px;
    padding:30px 25px;
    box-shadow:0 20px 50px rgba(0,0,0,0.25);
    animation: fadeIn 0.6s ease;
    position:relative;
}
.header { display:flex; justify-content:space-between; align-items:center; margin-bottom:25px; }
.header h3 { font-weight:600; font-size:20px; color:#1a1a1a; }
.back-btn { text-decoration:none; color:#0d6efd; font-weight:500; display:flex; align-items:center; gap:6px; }
.back-btn:hover { opacity:0.7; }
label { font-size:13px; font-weight:500; margin-bottom:6px; color:#555; display:block; }
input, select {
    width:100%; padding:14px 15px; margin-bottom:18px; border-radius:14px; border:1px solid #e0e0e0; font-size:14px;
    transition:0.3s ease; background:#f9fafc;
}
input:focus, select:focus { border-color:#0d6efd; box-shadow:0 0 0 3px rgba(13,110,253,0.15); outline:none; background:#fff; }
#converted_amount { font-size:13px; font-weight:600; color:#0d6efd; margin-bottom:10px; }
#medal_display { font-size:13px; font-weight:600; margin-bottom:15px; color:#333; }
button {
    width:100%; padding:14px; border-radius:50px; border:none; font-weight:600; font-size:15px; color:white;
    cursor:pointer; background:linear-gradient(135deg,#0d6efd,#0056d2); transition:all 0.3s ease;
}
button:hover { transform:translateY(-2px); box-shadow:0 10px 25px rgba(0,86,210,0.4); }
.spinner {
    border:3px solid rgba(255,255,255,0.3);
    border-top:3px solid #fff;
    border-radius:50%;
    width:16px;
    height:16px;
    animation: spin 0.8s linear infinite;
    display:inline-block;
    vertical-align:middle;
    margin-right:8px;
}
@keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
@keyframes fadeIn { from{opacity:0; transform:translateY(20px);} to{opacity:1; transform:translateY(0);} }
@media(max-width:480px){.container{padding:25px 18px; border-radius:20px;}}
</style>
</head>
<body>

<div class="container">
    <div class="header">
        <h3>Partner ID {{ user_id }}</h3>
        <a href="{{ url_for('home2') }}" class="back-btn"><i class="fas fa-arrow-left"></i> Back</a>
    </div>

    <form id="pledgeForm" action="{{ url_for('add_pledge') }}" method="POST">

        <label>Partner ID</label>
        <input type="text" name="user_id" required value="{{ user_id }}" placeholder="Enter Partner ID">

        <label>Pledged Amount</label>
        <input type="text" id="pledged_amount" name="pledged_amount" required placeholder="Enter amount">

        <label>Currency</label>
        <select id="currency" name="currency" required>
            <option value="USD">USD - United States Dollar</option>
            <option value="EUR">EUR - Euro</option>
            <option value="GBP">GBP - British Pound</option>
            <option value="NGN">NGN - Nigerian Naira</option>
            <option value="CAD">CAD - Canadian Dollar</option>
            <option value="AUD">AUD - Australian Dollar</option>
        </select>

        <label>Pledged Date</label>
        <input type="date" name="donation_date" required>

        <!-- Hidden Medal Field -->
        <input type="hidden" name="medal" id="medal">

        <p id="converted_amount"></p>
        <p id="medal_display"></p>

        <button type="submit" id="submitBtn">Submit Pledge</button>
    </form>
</div>

<script>
function formatNumber(num){return num.toString().replace(/\B(?=(\d{3})+(?!\d))/g,",");}

// Medal range based on USD
function getMedalByUSD(usd){
    if(usd >= 60000) return "Diamond Partner";
    if(usd >= 5800) return "Platinum Partner";
    if(usd >= 581) return "Gold Partner";
    return "Blue Partner";
}

document.getElementById("pledged_amount").addEventListener("input", function(){
    let val = this.value.replace(/[^0-9.]/g,'');
    this.value = formatNumber(val);
    updateExchangeRate();
});

async function updateExchangeRate(){
    const pledgedAmount = document.getElementById("pledged_amount").value.replace(/,/g,'');
    const currency = document.getElementById("currency").value;
    if(!pledgedAmount) return;

    try{
        const res = await fetch('/api/rates');
        const data = await res.json();
        const rate = data.conversion_rates[currency];
        if(rate){
            const usdVal = (pledgedAmount / rate).toFixed(2);
            document.getElementById("converted_amount").textContent =
                `Equivalent in USD: $${formatNumber(usdVal)}`;

            const medal = getMedalByUSD(parseFloat(usdVal));
            document.getElementById("medal").value = medal;
            document.getElementById("medal_display").textContent = `Medal: ${medal}`;
        }
    }catch{
        document.getElementById("converted_amount").textContent = "Exchange rate unavailable.";
    }
}

document.getElementById("currency").addEventListener("change", updateExchangeRate);

document.getElementById("pledgeForm").addEventListener("submit", function(){
    const btn = document.getElementById("submitBtn");
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span> Processing...';
});
</script>

</body>
</html>

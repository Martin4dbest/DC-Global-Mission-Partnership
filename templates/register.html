<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Partner Registration</title>

<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"/>

</head>

<body class="bg-gray-100 min-h-screen flex items-center justify-center px-3 py-6 text-xs sm:text-sm">

<div class="bg-white rounded-xl shadow-md w-full max-w-md sm:max-w-2xl p-4 sm:p-6">

  <h1 class="text-lg sm:text-2xl font-bold text-indigo-600 text-center mb-4 sm:mb-6">
    Partner Registration
  </h1>

  <form method="POST" action="{{ url_for('register') }}" 
        id="registrationForm" 
        class="grid gap-3 sm:grid-cols-2 sm:gap-4">

    <!-- Full Name -->
    <div class="flex flex-col">
      <label class="font-medium mb-1">Full Name</label>
      <input type="text" name="name" required
        class="w-full px-3 py-2 border rounded-lg focus:ring-1 focus:ring-indigo-500"/>
    </div>

    <!-- Phone -->
    <div class="flex flex-col">
      <label class="font-medium mb-1">Phone</label>
      <input type="text" name="phone" required
        class="w-full px-3 py-2 border rounded-lg focus:ring-1 focus:ring-indigo-500"/>
    </div>

    <!-- Email -->
    <div class="flex flex-col">
      <label class="font-medium mb-1">Email</label>
      <input type="email" name="email" required
        class="w-full px-3 py-2 border rounded-lg focus:ring-1 focus:ring-indigo-500"/>
    </div>

    <!-- Password -->
    <div class="flex flex-col relative">
      <label class="font-medium mb-1">Password</label>
      <input type="password" id="password" name="password" required
        class="w-full px-3 py-2 border rounded-lg pr-8 focus:ring-1 focus:ring-indigo-500"/>
      <i class="fas fa-eye absolute right-3 top-8 cursor-pointer text-gray-500 text-sm" id="togglePassword"></i>
    </div>

    <!-- Partner Since -->
    <div class="flex flex-col">
      <label class="font-medium mb-1">Partner Since</label>
      <select name="partner_since" required
        class="w-full px-3 py-2 border rounded-lg focus:ring-1 focus:ring-indigo-500">
        <option value="" disabled selected>Select year</option>
        {% for year in range(1990, current_year + 1) %}
          <option value="{{ year }}">{{ year }}</option>
        {% endfor %}
      </select>
    </div>

    <!-- Birthday -->
    <div class="flex flex-col">
      <label class="font-medium mb-1">Birthday</label>
      <input type="date" name="birthday" required
        class="w-full px-3 py-2 border rounded-lg focus:ring-1 focus:ring-indigo-500"/>
    </div>

    <!-- Local Church -->
    <div class="flex flex-col">
      <label class="font-medium mb-1">Local Church</label>
      <input type="text" name="church_branch" required
        class="w-full px-3 py-2 border rounded-lg focus:ring-1 focus:ring-indigo-500"/>
    </div>

    <!-- Address -->
    <div class="flex flex-col sm:col-span-2">
      <label class="font-medium mb-1">Address</label>
      <input type="text" name="address"
        class="w-full px-3 py-2 border rounded-lg focus:ring-1 focus:ring-indigo-500"/>
    </div>

    <!-- Country -->
    <div class="flex flex-col">
      <label class="font-medium mb-1">Country</label>
      <select id="country" name="country" required
        class="w-full px-3 py-2 border rounded-lg focus:ring-1 focus:ring-indigo-500">
        <option value="">Loading...</option>
      </select>
    </div>

    <!-- State -->
    <div class="flex flex-col">
      <label class="font-medium mb-1">State</label>
      <select id="state" name="state" required
        class="w-full px-3 py-2 border rounded-lg focus:ring-1 focus:ring-indigo-500">
        <option value="">Select country first</option>
      </select>

      <input type="text" id="manual_state" name="manual_state"
        placeholder="Enter state if not listed"
        class="mt-2 w-full px-3 py-2 border rounded-lg focus:ring-1 focus:ring-indigo-500 hidden"/>
    </div>

    <!-- Submit -->
    <div class="sm:col-span-2 mt-2">
      <button type="submit" id="submitBtn"
        class="w-full bg-indigo-600 text-white py-2 rounded-lg hover:bg-indigo-700 transition font-semibold flex justify-center items-center gap-2 text-sm">
        <span id="btnText">Register</span>
        <i class="fas fa-spinner fa-spin hidden" id="loadingIcon"></i>
      </button>
    </div>

    <!-- Login -->
    <div class="sm:col-span-2 text-center mt-2">
      <p class="text-xs sm:text-sm">
        Already have an account?
        <a href="{{ url_for('login') }}" class="text-indigo-600 hover:underline">
          Login here
        </a>
      </p>
    </div>

  </form>

  <!-- Flash Messages -->
  {% with messages = get_flashed_messages() %}
    {% if messages %}
      <div class="mt-4">
        {% for message in messages %}
          <div class="bg-green-100 text-green-800 p-2 rounded-lg text-center text-xs sm:text-sm">
            {{ message }}
          </div>
        {% endfor %}
      </div>
    {% endif %}
  {% endwith %}

</div>

<script>
  // Toggle password visibility
  document.getElementById("togglePassword").addEventListener("click", function(){
    const pwd = document.getElementById("password");
    if(pwd.type === "password"){
      pwd.type = "text";
      this.classList.replace("fa-eye","fa-eye-slash");
    } else {
      pwd.type = "password";
      this.classList.replace("fa-eye-slash","fa-eye");
    }
  });

  // Loading spinner
  const form = document.getElementById("registrationForm");
  const submitBtn = document.getElementById("submitBtn");
  const btnText = document.getElementById("btnText");
  const loadingIcon = document.getElementById("loadingIcon");

  form.addEventListener("submit", function(){
    btnText.textContent = "Registering...";
    loadingIcon.classList.remove("hidden");
    submitBtn.disabled = true;
  });

  // Fetch countries and states
  const countryDropdown = document.getElementById("country");
  const stateDropdown = document.getElementById("state");
  const manualState = document.getElementById("manual_state");

  fetch('https://countriesnow.space/api/v0.1/countries/states')
    .then(res => res.json())
    .then(data => {
      countryDropdown.innerHTML = "<option value=''>Select Country</option>";
      data.data.forEach(item => {
        const option = document.createElement('option');
        option.value = item.name;
        option.textContent = item.name;
        countryDropdown.appendChild(option);
      });

      countryDropdown.addEventListener('change', () => {
        const selected = countryDropdown.value;
        const countryData = data.data.find(c => c.name === selected);
        stateDropdown.innerHTML = "<option value=''>Select State</option>";

        if(countryData && countryData.states.length > 0){
          countryData.states.forEach(s => {
            const option = document.createElement('option');
            option.value = s.name;
            option.textContent = s.name;
            stateDropdown.appendChild(option);
          });
          stateDropdown.disabled = false;
          manualState.classList.add("hidden");
        } else {
          stateDropdown.disabled = true;
          manualState.classList.remove("hidden");
        }
      });
    })
    .catch(() => {
      countryDropdown.innerHTML = "<option value=''>Failed to load countries</option>";
    });
</script>

</body>
</html>

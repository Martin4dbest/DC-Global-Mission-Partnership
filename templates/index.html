<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DC Global Mission Partnership</title>

<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

<style>
body {
    font-family: 'Poppins', sans-serif;
    margin: 0;
    padding: 0;
    background: linear-gradient(135deg, #e0f2fe 0%, #f0f4f8 100%);
    color: #1e293b;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
}

.main-container {
    background: #fff;
    border-radius: 20px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.1);
    padding: 20px 15px;
    max-width: 380px;
    width: 100%;
    text-align: center;
}

.logo-section img {
    width: 80px;
    height: 80px;
    border-radius: 12px;
    object-fit: cover;
    margin-bottom: 10px;
}

.title h1 {
    font-size: 1.3rem;
    font-weight: 700;
    margin-bottom: 5px;
    color: #0f172a;
}

.title h1 span { color: #059669; }

.title h2 {
    font-size: 0.8rem;
    font-weight: 500;
    color: #475569;
    margin-bottom: 12px;
}

/* Buttons / links */
.links-section {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-bottom: 10px;
}

.nav-link {
    width: auto;
    min-width: 160px; /* Shorter width */
    max-width: 220px;
    padding: 10px 15px;
    background: #254694; /* deep blue */
    color: #FCD116;      /* yellow text */
    border-radius: 999px; /* pill-shaped */
    font-weight: 600;
    font-size: 0.85rem;
    text-decoration: none;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    margin: 0 auto; /* center horizontally */
    box-shadow: 0 2px 6px rgba(0,0,0,0.15);
    transition: all 0.3s ease-in-out;
}

.nav-link:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 12px rgba(0,0,0,0.25);
}

/* Register text */
.register-text {
    font-size: 0.75rem;
    margin-top: 5px;
}

.register-text a { color: #059669; text-decoration: underline; }

/* Footer */
footer {
    margin-top: 15px;
    text-align: center;
    font-size: 0.7rem;
    color: #94a3b8;
}

.social-icons {
    margin-top: 5px;
    display: flex;
    justify-content: center;
    gap: 10px;
}

.social-icons a {
    font-size: 1.2rem;
    transition: transform 0.2s;
}

.social-icons a:hover { transform: scale(1.15); }

/* Brand Colors */
.social-icons a.youtube { color: #FF0000; }
.social-icons a.facebook { color: #3b5998; }
.social-icons a.twitter { color: #1DA1F2; }
.social-icons a.instagram { color: #C13584; }
.social-icons a.whatsapp { color: #25D366; }
.social-icons a.email { color: #6e6e6e; }

/* Mobile adjustments */
@media (max-width: 480px) {
    .logo-section img { width: 60px; height: 60px; }
    .title h1 { font-size: 1.2rem; }
    .title h2 { font-size: 0.75rem; }
    .nav-link { font-size: 0.8rem; padding: 8px 12px; min-width: 140px; }
    .social-icons a { font-size: 1rem; }
    .register-text { font-size: 0.65rem; }
}
</style>
</head>

<body>
<div class="main-container">

    <!-- Logo + Title -->
    <div class="logo-section">
        <img src="{{ url_for('static', filename='images/dominion_city.jpeg') }}" alt="Church Logo">
        <div class="title">
            <h1>DC Global <span>Mission Partnership</span></h1>
            <h2>Secure donations & engagement</h2>
        </div>
    </div>

    <!-- Buttons -->
    <div class="links-section">
        <a href="{{ url_for('login') }}" class="nav-link"><i class="fas fa-user"></i> Login</a>
        <a href="https://www.dominioncity.cc/" target="_blank" class="nav-link"><i class="fas fa-calendar-alt"></i> Events</a>
        <a href="{{ url_for('contact') }}" class="nav-link"><i class="fas fa-envelope"></i> Contact Us</a>
        <p class="register-text">Don't have an account? <a href="{{ url_for('register') }}">Register</a></p>
    </div>

    <!-- Footer / Social Icons -->
    <footer>
        <p>&copy; 2026 DC Global Mission Partnership</p>
        <div class="social-icons">
            <a href="https://www.youtube.com/c/DominionCity" target="_blank" class="youtube"><i class="fab fa-youtube"></i></a>
            <a href="https://web.facebook.com/dominioncity/" target="_blank" class="facebook"><i class="fab fa-facebook"></i></a>
            <a href="https://x.com/thedominioncity" target="_blank" class="twitter"><i class="fab fa-x-twitter"></i></a>
            <a href="https://www.instagram.com/thedominioncity/" target="_blank" class="instagram"><i class="fab fa-instagram"></i></a>
            <a href="https://api.whatsapp.com/send?phone=2348103526864" target="_blank" class="whatsapp"><i class="fab fa-whatsapp"></i></a>
            <a href="{{ url_for('contact') }}" class="email"><i class="fas fa-envelope"></i></a>
        </div>
    </footer>

</div>
</body>
</html>
